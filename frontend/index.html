<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Reading Circle</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="app-header">
    <h1 id="appTitle">📚 The Reading Circle</h1>
    <button id="adminButton" title="Admin Mode">
        🔒
    </button>
    <button id="settingsButton" title="Settings" aria-label="Settings">
        ⚙️
    </button>
</header>
    
    <main>
        <div id="library" class="library-container">
        </div>
    </main>

<!-- ==========================================
    Settings Modal
========================================== -->

<div id="modalOverlay" class="modal-overlay modal-hidden">
    <div class="modal">
        <h2>Settings</h2>
        <div class="setting-group">
            <label for="appNameInput">
                Application Name
            </label>
            <input
                id="appNameInput"
                type="text"
            >
        </div>
        <div class="modal-actions">
            <button id="cancelButton"
                class="modal-cancel">
                Cancel
            </button>
            <button id="saveButton"
                class="modal-save">
                Change It
            </button>
        </div>
    </div>
</div>

<!-- Add Book Modal -->
<div id="addBookModal" class="modal-overlay modal-hidden">
    <div class="modal">
        <h2> 📚 Looking for more? <h2>
          <div class="modal-body">

            <label for="bookSearchInput">
            
            </label>

            <div class="search-row">
                <input
                    id="bookSearchInput"
                    type="text"
                    placeholder="what's it called again?"
                >

                <button
                    id="searchBookButton"
                    type="button"
                >
                    Let's go!
                </button>

            </div>

            <div id="searchResults"></div>

            <div id="selectedBookPreview"></div>

        </div>
            <div class="modal-actions">
            <button id="cancelBookButton"
                class="modal-cancel">
                Nope, not now
            </button>

            <button id="saveBookButton"
                class="modal-save">
                Save
            </button>
        </div>
    </div>
</div>


<!-- Book Details Modal -->
<div id="bookDetailsModal" class="modal-overlay modal-hidden">
    <div class="modal">
        <div id="bookDetailsBody"></div>
    </div>
</div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
